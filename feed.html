<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>World Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
      integrity="sha256-kLaT2GOSpHechhsozzB+flnD+zUyjE2LlfWPgU04xyI="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"
      integrity="sha256-WBkoXOwTeyKclOHuWtc+i2uENFpDZ9YPdf5Hf+D7ewM="
      crossorigin=""
    ></script>
    <link rel="icon" type="image/x-icon" href="resources/images/logo.png" />
    <script
      src="https://cdn.jsdelivr.net/gh/alpinejs/alpine@v2.3.5/dist/alpine.min.js"
      defer
    ></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="//unpkg.com/alpinejs" defer></script>

    <link rel="stylesheet" href="/resources/css/index.css" />

    <script src="/resources/js/feed.js" defer></script>
  </head>

  <body class="w-full bg-gray-300 h-screen">
    <nav class="bg-white border-gray-200 dark:bg-gray-900">
      <div
        class="w-full flex justify-between p-4  max-[1000px]:items-center max-[1000px]:flex-col"
      >
      <!-- flex flex-col justify-center sm:flex-row md:flex-wrap flex-wrap items-center sm:justify-between p-4 -->
        <a href="./index.html" class="flex items-center">
          <img src="/resources/images/logo.png" class="h-8 mr-3" alt="Icon" />
          <!--<img src="https://flowbite.com/docs/images/logo.svg" class="h-8 mr-3" alt="Flowbite Logo" /> -->
          <span
            class="self-center text-2xl  font-semibold whitespace-nowrap dark:text-white"
            >Air Quality Index</span
          >
        </a>
        <div
          class="self-center text-center max-[500px]:flex-col  max-[750px]:text-sm text-xl flex flex-row justify-center lg:flex-nowrap"
        >
          <a
            class="text-white mx-2 hover:underline hover:underline-gray-200 hover:font-bold"
            href="/"
          >
            World Map
          </a>
          <a
            class="text-white mx-2 hover:underline hover:underline-gray-200 hover:font-bold"
            href="./feed.html"
          >
            Feed
          </a>
          <!-- <span class="text-white">|</span> -->
          <a
            class="text-white mx-2 hover:underline hover:underline-gray-200 hover:font-bold"
            href="./station.html"
          >
            Specific station
          </a>
          <!-- <span class="text-white">|</span> -->

          <a
            class="text-white mx-2 hover:underline hover:underline-gray-200 hover:font-bold"
            href="./facts.html"
          >
            Knowledge
          </a>
          <a
            class="text-white mx-2 hover:underline hover:underline-gray-200 hover:font-bold"
            href="./about.html"
          >
            About us
          </a>
        </div>
      </div>
    </nav>
    <!-- <div id="leaflet-locations"></div> -->
    <div id="content" class="flex flex-col w-full">
      <h1 class="font-bold text-center text-xl">AQI Feed</h1>
      <div
        class="flex-col flex-wrap justify-center text-center lg:px-[180px]"
        id="mutiple-city-aqi"
      ></div>
      <div class="flex">
        <button
          class="mx-auto p-2 text-white hover:bg-white hover:bg-blue-400 hover:text-black text-xl bg-blue-500 rounded-lg m-2"
          id="randomize"
          >
          Get Random City/Country feed
        </button>
        <div id="error"></div>
      </div>
    </div>
  </body>
</html>
